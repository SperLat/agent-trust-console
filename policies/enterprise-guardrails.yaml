version: "1.0"
policy_name: "enterprise-agent-governance"
default_action: ALLOW

ingress_rules:
  - name: block_prompt_injection
    description: Detected prompt injection or instruction override
    priority: 100
    action: DENY
    deny_message: "[LOBSTER TRAP] Blocked: prompt injection detected."
    conditions:
      - field: contains_injection_patterns
        match_type: boolean
        value: true
  - name: quarantine_credential_access
    description: Prompt requests secrets or credential material
    priority: 95
    action: QUARANTINE
    conditions:
      - field: contains_credentials
        match_type: boolean
        value: true
  - name: review_high_risk_intent
    description: Review requests with elevated aggregate risk
    priority: 70
    action: HUMAN_REVIEW
    conditions:
      - field: risk_score
        match_type: threshold
        value: 0.35

egress_rules:
  - name: quarantine_secret_output
    description: Model output appears to contain credentials
    priority: 100
    action: QUARANTINE
    conditions:
      - field: contains_credentials
        match_type: boolean
        value: true
  - name: review_pii_output
    description: Model output contains PII or regulated data
    priority: 90
    action: HUMAN_REVIEW
    conditions:
      - field: contains_pii
        match_type: boolean
        value: true

rate_limits:
  requests_per_minute: 120
  requests_per_hour: 2000
  burst_threshold: 30

network:
  egress_policy: allowlist
  allowed_domains:
    - "api.openai.com"
    - "api.anthropic.com"
    - "localhost"
  denied_domains:
    - "pastebin.com"
    - "webhook.site"
    - "transfer.sh"
    - "anonfiles.com"

filesystem:
  denied_paths:
    - "**/.env"
    - "**/.ssh"
    - "/etc/passwd"
    - "**/id_rsa"
    - "**/secrets.json"
  allowed_read_paths:
    - "/tmp/agent_workspace/**"
    - "/home/*/documents/**"
  allowed_write_paths:
    - "/tmp/agent_workspace/agent_output/**"

audit:
  format: jsonl
  capture_declared_metadata: true
  capture_detected_metadata: true
  retain_days: 90
